model:
  nodes_total: 16
  cache_capacity: 16
  use_first_hop_key_hint: false
  use_learned_first_hop_router: true
task:
  name: memory
  writers_per_episode: 4
  max_rollout_steps: 8
train:
  batch_size_per_gpu: 8
  train_steps: 250
  eval_interval: 50
  log_interval: 25
  save_interval: 125
  val_batches: 16
  lr: 2.0e-4
  aux_writer_weight: 2.0
  aux_query_weight: 2.0
  first_hop_teacher_force_start: 1.0
  first_hop_teacher_force_end: 0.25
  first_hop_teacher_force_anneal_steps: 150
runtime:
  run_name: v2-smoke
